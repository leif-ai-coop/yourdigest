services:
  api:
    build:
      context: ./backend
    container_name: assistant-api-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://assistant:devpassword@db:5432/assistant
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${ASSISTANT_OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${ASSISTANT_OPENROUTER_MODEL:-google/gemini-3.1-flash-lite-preview}
      SECRET_KEY: dev-secret-key-change-in-production
      WORKER_ENABLED: "true"
      LOG_LEVEL: debug
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend/app:/app/app

  db:
    image: postgres:15-alpine
    container_name: assistant-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: assistant-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
